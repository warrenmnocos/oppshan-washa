<main class="signin-wrap">
  <section class="signin-card">
    <div class="signin-band">
      <span class="signin-mark">
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M4 7 L8 17 L12 10.5 L16 17 L20 7" stroke="currentColor" stroke-width="2.3"
                stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="20" cy="7" r="2.05" fill="currentColor"/>
        </svg>
      </span>
      <h1>{{ 'signIn.title' | translate }}</h1>
      <p>{{ 'signIn.subtitle' | translate }}</p>
    </div>

    <div class="signin-body">
      @if (messageKey) {
        <p class="error">{{ messageKey | translate }}</p>
      }

      <p class="prompt">{{ 'signIn.prompt' | translate }}</p>

      <button type="button" class="google-btn" (click)="signIn()">
        <img class="google-logo" src="/icons/google-logo.svg" alt="" width="18" height="18">
        {{ 'signIn.signInWithGoogle' | translate }}
      </button>

      <p class="oauth-note">{{ 'signIn.oauthNote' | translate }}</p>
    </div>
  </section>
</main>
