<header class="topbar">
  <a class="brand" routerLink="/" aria-label="washa">
    <span class="brand-mark">
      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M4 7 L8 17 L12 10.5 L16 17 L20 7" stroke="currentColor" stroke-width="2.3"
              stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="20" cy="7" r="2.05" fill="currentColor"/>
      </svg>
    </span>
    <span class="brand-name">washa</span>
  </a>

  <div class="topbar-right">
    @if (user(); as currentUser) {
      <span class="who" [title]="currentUser.displayName">{{ currentUser.displayName }}</span>
    }
    <a class="signout" href="/sso/sign-out">
      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M15 8V6a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h7a2 2 0 0 0 2-2v-2"
              stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M10 12h10m0 0-3-3m3 3-3 3" stroke="currentColor" stroke-width="1.8"
              stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span>{{ 'header.signOut' | translate }}</span>
    </a>
  </div>
</header>
