quarkus.http.port=8080
quarkus.http.http2=false
# Behind CloudFront → Lambda Function URL: honor forwarded host/proto/prefix so OIDC redirect URIs
# and Response.seeOther redirects use the public https://washa.oppshan.com origin, not the origin host.
quarkus.http.proxy.proxy-address-forwarding=true
quarkus.http.proxy.enable-forwarded-host=true
quarkus.http.proxy.enable-forwarded-prefix=true

# --- Datasource (Neon Postgres; values from env / Parameter Store at runtime) ---
quarkus.datasource.db-kind=postgresql
quarkus.datasource.db-version=18
# Tiny pool: 2 users behind a small reserved-concurrency Lambda, on Neon's pooled endpoint.
quarkus.datasource.jdbc.min-size=0
quarkus.datasource.jdbc.max-size=2
quarkus.datasource.jdbc.acquisition-timeout=10

# --- Hibernate ORM ---
# App objects live in the `washa` schema (not public) within the `oppshan` database.
quarkus.hibernate-orm.database.default-schema=washa
# Validate the mapped entities against the Flyway-built schema on boot and halt on drift, so a
# column/type mismatch fails fast (this is what surfaced the year_month CHAR/VARCHAR mismatch).
quarkus.hibernate-orm.schema-management.strategy=validate
quarkus.hibernate-orm.schema-management.halt-on-error=true
# Columns are TIMESTAMPTZ and entities use Instant; pin the JDBC session to UTC to make it explicit.
quarkus.hibernate-orm.jdbc.timezone=UTC

# --- Flyway ---
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=db/migration/postgresql
# Create and target the washa schema; unqualified migration DDL lands there.
quarkus.flyway.schemas=washa
quarkus.flyway.create-schemas=true

# --- Google OIDC (single default tenant, authorization-code/web-app flow) ---
quarkus.oidc.provider=google
quarkus.oidc.client-id=${GOOGLE_CLIENT_ID}
quarkus.oidc.credentials.secret=${GOOGLE_CLIENT_SECRET}
quarkus.oidc.application-type=web-app
quarkus.oidc.authentication.scopes=openid,email,profile
# Request offline access so Google issues a refresh token (token.refresh-expired below depends on
# one); prompt=consent re-issues it when the user re-consents.
quarkus.oidc.authentication.extra-params.access_type=offline
quarkus.oidc.authentication.extra-params.prompt=consent
quarkus.oidc.authentication.redirect-path=/sso/sign-in/oidc/callback/google
quarkus.oidc.authentication.error-path=/sso/sign-in?message=messages.errors.signInFailed
quarkus.oidc.authentication.session-age-extension=5M
quarkus.oidc.token.refresh-expired=true
quarkus.oidc.token-state-manager.encryption-secret=${TOKEN_ENCRYPTION_SECRET}
# Google advertises no end_session_endpoint, so RP-Initiated Logout (quarkus.oidc.logout.path)
# would fail tenant init. Sign-out is a LOCAL logout instead: SsoEndpoint GET /sso/sign-out clears
# the washa session cookie via OidcSession.logout() and redirects to the dashboard.

# --- Allowlist (JSON: person -> emails); from Parameter Store ---
washa.allowed-identities=${WASHA_ALLOWED_IDENTITIES:[]}

# --- Coverage (test profile) ---
# Exclude generated sources from JaCoCo: the Hibernate JPA metamodel (Foo_) and the Jakarta Data
# repository/entity implementations (_Foo, FooRepository_) — none of which are hand-written.
%test.quarkus.jacoco.report=true
%test.quarkus.jacoco.excludes=**/*_.class,**/_*.class

# --- Test profile ---
# OIDC is disabled in tests; identity is synthesized by @TestSecurity/@JwtSecurity (so there is no
# OIDC server connection to hang on). Postgres runs as a Dev Service.
%test.quarkus.oidc.enabled=false
%test.quarkus.datasource.devservices.enabled=true
%test.quarkus.datasource.devservices.image-name=postgres:18
# Sanitized example allowlist for integration tests (no real identities).
%test.washa.allowed-identities=[{"firstName":"Alice","lastName":"Example","emails":["alice@example.com","alice.alt@example.com"]}]
