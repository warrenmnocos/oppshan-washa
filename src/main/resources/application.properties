quarkus.http.port=8080
quarkus.http.http2=false

# --- Datasource (Neon Postgres; values from env / Parameter Store at runtime) ---
quarkus.datasource.db-kind=postgresql
quarkus.datasource.db-version=18
# Tiny pool: 2 users behind a small reserved-concurrency Lambda, on Neon's pooled endpoint.
quarkus.datasource.jdbc.min-size=0
quarkus.datasource.jdbc.max-size=2
quarkus.datasource.jdbc.acquisition-timeout=10

# --- Flyway ---
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=db/migration/postgresql

# --- Google OIDC (web-app flow); secrets from env / Parameter Store ---
quarkus.oidc.google.provider=google
quarkus.oidc.google.client-id=${GOOGLE_CLIENT_ID}
quarkus.oidc.google.credentials.secret=${GOOGLE_CLIENT_SECRET}
quarkus.oidc.google.authentication.scopes=openid,email,profile
quarkus.oidc.google.authentication.redirect-path=/sso/sign-in/oidc/callback/google
quarkus.oidc.google.authentication.error-path=/?message=messages.errors.signInFailed
quarkus.oidc.application-type=web-app
quarkus.oidc.authentication.session-age-extension=5M
quarkus.oidc.token.refresh-expired=true
quarkus.oidc.token-state-manager.encryption-secret=${TOKEN_ENCRYPTION_SECRET}

# --- Allowlist (JSON: person -> emails); from Parameter Store ---
washa.allowed-identities=${WASHA_ALLOWED_IDENTITIES:[]}

# --- Test profile: Keycloak/OIDC Dev Service stands in for Google; Postgres Dev Service ---
%test.quarkus.oidc.google.provider=
%test.quarkus.oidc.google.client-id=quarkus-app
%test.quarkus.oidc.google.credentials.secret=secret
%test.quarkus.oidc.google.application-type=web-app
%test.quarkus.oidc.google.authentication.scopes=openid,email,profile
%test.quarkus.oidc.token-state-manager.encryption-secret=secret
%test.quarkus.datasource.devservices.enabled=true
%test.quarkus.datasource.devservices.image-name=postgres:18
