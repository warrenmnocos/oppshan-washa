# Docker Compose definition for the PGO workflow's Postgres + Keycloak.
# Mirrors what the GitHub Actions `services:` block would provide in CI, but lets the same
# native-release-pgo Maven build run unchanged on a workstation. Host ports default to 55432
# (Postgres) / 8180 (Keycloak); override via env vars PG_HOST_PORT / KC_HOST_PORT if those collide
# with other local services. Container-internal ports are fixed (5432 / 8180) — the binary reaches
# the containers via the QUARKUS_DATASOURCE_JDBC_URL and QUARKUS_OIDC_AUTH_SERVER_URL env vars that
# pgo-test-binary.sh injects.
#
# Prod persistence is Neon (managed Postgres), so there is no prod box to mirror config against;
# this local Postgres just needs enough headroom that the 10-worker load test measures washa's app
# code rather than a starved page cache. The figures below are sized for that, not prod parity.

services:
  postgres:
    image: postgres:18
    command:
      - postgres
      - -c
      - shared_buffers=256MB
      - -c
      - work_mem=16MB
      - -c
      - max_wal_size=1GB
      - -c
      - wal_buffers=16MB
      - -c
      - max_connections=40
      - -c
      - synchronous_commit=on
      # random_page_cost=1.1 is the conventional SSD planner setting, so the load test exercises the
      # index-friendly plans a managed SSD-backed Postgres would pick.
      - -c
      - random_page_cost=1.1
      # pg_stat_statements gives per-query timing during the run, so any slow path the workload
      # surfaces can be diagnosed without a re-run. The matching CREATE EXTENSION lives in
      # pg-init/01-extensions.sql, run once by the image's /docker-entrypoint-initdb.d/ hook.
      - -c
      - shared_preload_libraries=pg_stat_statements
    environment:
      POSTGRES_DB: oppshan
      POSTGRES_PASSWORD: postgres
    ports:
      - "${PG_HOST_PORT:-55432}:5432"
    volumes:
      - ./pg-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d oppshan"]
      interval: 5s
      timeout: 5s
      retries: 12

  keycloak:
    image: quay.io/keycloak/keycloak:26.5.4
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: "8180"
    ports:
      - "${KC_HOST_PORT:-8180}:8180"
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8180; echo -e 'GET /realms/master HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n' >&3; head -n 1 <&3 | grep -q '200\\|301\\|302'"]
      interval: 10s
      timeout: 5s
      retries: 12
